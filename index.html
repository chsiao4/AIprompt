<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 AI Prompt 智能寶庫</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome 圖示 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts - 繁體中文優化字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans TC', 'sans-serif'],
          },
          boxShadow: {
            'premium': '0 10px 30px -10px rgba(0, 0, 0, 0.08)',
            'card-hover': '0 20px 40px -15px rgba(124, 58, 237, 0.12)',
          }
        }
      }
    }
  </script>

  <style>
    /* 自訂捲軸樣式，讓 Prompt 卡片內容滑動更優雅 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* 閃爍動畫，用於資料讀取 */
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }
    .pulse-loading {
      animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans flex flex-col justify-between">

  <!-- 主容器 -->
  <div class="container mx-auto px-4 py-8 max-w-7xl flex-grow">
    
    <!-- 頁首與標題區 -->
    <header class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-black text-slate-800 flex items-center justify-center gap-3 tracking-wide">
        <span>🚀</span> AI Prompt 智能寶庫
      </h1>
      
      <!-- Google Sheet 原始資料連結 -->
      <div class="mt-3 inline-flex items-center">
        <a href="https://docs.google.com/spreadsheets/d/1ByDDPypDeVxd335sPKnMfQQlx7t8n2M_sL8Je98yUwM/edit?usp=sharing" 
           target="_blank" 
           class="text-xs md:text-sm text-slate-500 hover:text-indigo-600 bg-white border border-slate-200 px-4 py-1.5 rounded-full shadow-sm transition-all duration-300 flex items-center gap-2 hover:shadow-md">
          <i class="fa-regular fa-folder-open text-amber-500"></i>
          <span>📁 開啟原始資料 Google Sheet</span>
        </a>
      </div>
    </header>

    <!-- 搜尋欄區塊 -->
    <div class="max-w-xl mx-auto mb-8 relative">
      <div class="relative shadow-sm rounded-full overflow-hidden border border-slate-200 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-100 transition-all duration-300">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="搜尋提示詞、標題或分類..." 
          class="block w-full pl-11 pr-20 py-3.5 bg-white text-slate-700 placeholder-slate-400 focus:outline-none text-sm md:text-base"
        />
        <div class="absolute inset-y-0 right-0 flex items-center pr-2">
          <span id="itemsCountBadge" class="text-xs font-semibold bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-full border border-indigo-100">
            載入中...
          </span>
        </div>
      </div>
      
      <!-- 即時資料同步狀態指示器 -->
      <div class="text-center mt-2">
        <span id="syncStatus" class="inline-flex items-center gap-1.5 text-xs text-slate-400">
          <i class="fa-solid fa-circle-notch fa-spin text-indigo-500"></i> 正在從雲端同步最新提示詞...
        </span>
      </div>
    </div>

    <!-- 類別篩選按鈕區 -->
    <div class="mb-10">
      <div id="filterContainer" class="flex flex-wrap justify-center gap-2.5 max-w-5xl mx-auto">
        <!-- 類別按鈕由 JavaScript 動態生成 -->
        <button onclick="filterCategory('全部')" class="px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 bg-blue-600 text-white shadow-md shadow-blue-200 transform scale-105">
          全部
        </button>
      </div>
    </div>

    <!-- 區段主題標籤 -->
    <div class="max-w-6xl mx-auto mb-6 flex items-center justify-between">
      <h2 class="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
        <span>🧠</span> AI 協思
      </h2>
      <button onclick="fetchDataFromSheet()" class="text-xs text-slate-400 hover:text-indigo-600 flex items-center gap-1 transition-colors duration-200" title="點擊強制重新整理">
        <i class="fa-solid fa-rotate"></i> 重新載入資料
      </button>
    </div>

    <!-- 骨架屏載入畫面 -->
    <div id="loadingSkeleton" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- 骨架卡片 1 -->
      <div class="bg-white rounded-2xl border-t-4 border-slate-200 shadow-sm p-5 space-y-4 pulse-loading">
        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
        <div class="h-6 bg-slate-200 rounded w-3/4"></div>
        <div class="space-y-2 py-4">
          <div class="h-3 bg-slate-100 rounded w-full"></div>
          <div class="h-3 bg-slate-100 rounded w-5/6"></div>
          <div class="h-3 bg-slate-100 rounded w-4/5"></div>
        </div>
        <div class="h-10 bg-slate-100 rounded w-full mt-4"></div>
      </div>
      <!-- 骨架卡片 2 -->
      <div class="bg-white rounded-2xl border-t-4 border-slate-200 shadow-sm p-5 space-y-4 pulse-loading">
        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
        <div class="h-6 bg-slate-200 rounded w-3/4"></div>
        <div class="space-y-2 py-4">
          <div class="h-3 bg-slate-100 rounded w-full"></div>
          <div class="h-3 bg-slate-100 rounded w-5/6"></div>
          <div class="h-3 bg-slate-100 rounded w-4/5"></div>
        </div>
        <div class="h-10 bg-slate-100 rounded w-full mt-4"></div>
      </div>
      <!-- 骨架卡片 3 -->
      <div class="bg-white rounded-2xl border-t-4 border-slate-200 shadow-sm p-5 space-y-4 pulse-loading">
        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
        <div class="h-6 bg-slate-200 rounded w-3/4"></div>
        <div class="space-y-2 py-4">
          <div class="h-3 bg-slate-100 rounded w-full"></div>
          <div class="h-3 bg-slate-100 rounded w-5/6"></div>
          <div class="h-3 bg-slate-100 rounded w-4/5"></div>
        </div>
        <div class="h-10 bg-slate-100 rounded w-full mt-4"></div>
      </div>
      <!-- 骨架卡片 4 -->
      <div class="bg-white rounded-2xl border-t-4 border-slate-200 shadow-sm p-5 space-y-4 pulse-loading">
        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
        <div class="h-6 bg-slate-200 rounded w-3/4"></div>
        <div class="space-y-2 py-4">
          <div class="h-3 bg-slate-100 rounded w-full"></div>
          <div class="h-3 bg-slate-100 rounded w-5/6"></div>
          <div class="h-3 bg-slate-100 rounded w-4/5"></div>
        </div>
        <div class="h-10 bg-slate-100 rounded w-full mt-4"></div>
      </div>
    </div>

    <!-- 提示詞卡片主網格區 -->
    <div id="cardsGrid" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden">
      <!-- 卡片由 JavaScript 動態生成 -->
    </div>

    <!-- 無搜尋結果提示 -->
    <div id="noResults" class="hidden text-center py-16">
      <div class="text-5xl mb-4">🔍</div>
      <h3 class="text-lg font-bold text-slate-700">找不到任何符合條件的提示詞</h3>
      <p class="text-sm text-slate-400 mt-1">請嘗試使用其他關鍵字或變更分類篩選！</p>
    </div>

  </div>

  <!-- 頁尾 -->
  <footer class="bg-white border-t border-slate-100 py-6 mt-12 text-center text-xs md:text-sm text-slate-400 shadow-sm">
    <div class="container mx-auto px-4">
      <p>© 2026 AI Prompt 智能寶庫. 所有提示詞版權歸原作者所有。</p>
      <p class="mt-1">由 AI 智慧驅動，點擊即可一鍵複製，加速您的工作流程。</p>
    </div>
  </footer>

  <!-- 自訂 Toast 通知元件 -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 translate-y-24 opacity-0 transition-all duration-300 pointer-events-none">
    <div class="bg-emerald-500 text-white rounded-full p-1.5 flex items-center justify-center">
      <i class="fa-solid fa-check text-xs"></i>
    </div>
    <div>
      <h4 class="font-bold text-sm text-white">已複製到剪貼簿！</h4>
      <p class="text-xs text-slate-300 mt-0.5">直接到 AI 工具貼上 (Ctrl+V) 即可使用</p>
    </div>
  </div>

  <script>
    // 1. 本地高還原備用資料（當 Google 試算表無法連線或跨域受限時，能自動完美接軌）
    const backupData = [
      {
        category: "內容創作",
        title: "意義單詞",
        prompt: "將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個有意義的單詞（如「VISION」）。"
      },
      {
        category: "內容創作",
        title: "品牌名稱",
        prompt: "完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個產品名稱與標題（口號）。\n- 提示詞指令：描述品牌與產品，請列出 數字 個產品名稱與行銷標題建議。(*品牌定義*描述、*產品介紹*描述)\n- Prompt 我想推出一個運動鞋品牌，今年會銷售一款新型跑步..."
      },
      {
        category: "筆記精煉",
        title: "長編文章",
        prompt: "為這一篇長篇文章，進行以下四個步驟，每一個步驟都提供給文章與標示出來：\n\n第1、請為這篇長文件生成一份簡短摘要。\n\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留核心主旨。"
      },
      {
        category: "筆記精煉",
        title: "書籍精煉",
        prompt: "請對 @[檔名]\n啟動【終極煉金管線】，一次執行四步驟整合：\n\n第一步：全域架構導航 (Stage 01)\n執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n\n第二步：價值 DNA 診斷 (Stage 02)..."
      },
      {
        category: "筆記精煉",
        title: "書籍精煉",
        prompt: "這是一本關於高效能工作習慣的書籍。請整理書中的 5 個核心概念，並為每個概念提供一個日常可執行的 2 分鐘微行動步驟。請確保格式清晰，使用 Markdown 條列呈現，能讓人一眼看懂並立即實踐。"
      },
      {
        category: "筆記精煉",
        title: "提取練習",
        prompt: "我剛讀完關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是否理解了「為什麼有效」，而非只是記住步驟。\n\n2-環境轉化：如果這段概念有複雜之處，請嘗試使用極具生活化的比喻向我說明，確保非專業人士也能秒懂。"
      },
      {
        category: "內容創作",
        title: "影片清理",
        prompt: "你的角色是一位「逐字稿校對員」，不是編輯。\n\n任務：\n1-僅刪除口語填充詞、重複說法、明顯冗詞。\n2-不得改寫句型、不得改變原意、不得加入新解釋。\n\n規則：\n1-原句順序必須完全一致。\n2-若刪除任何詞語，需確保前後語氣能保持基本流暢通順，且不可丟失原本的意思。"
      },
      {
        category: "內容創作",
        title: "影片清理",
        prompt: "你的角色是一位「內容結構化整理員」，不是編輯、不是評論者。\n\n我會提供一段約 4000 字的影片文字內容，請你在完全保留原作者語意與立場的前提下，進行「保留語意的濃縮」，將內容壓縮至約 2000 字。全文請用繁體中文呈現。"
      }
    ];

    // 全域變數定義
    let allPrompts = []; // 保存所有讀取到的提示詞
    let activeCategory = '全部'; // 目前選取的分類
    let currentSearchQuery = ''; // 目前輸入的關鍵字

    // 2. 初始化流程
    window.onload = function() {
      fetchDataFromSheet();
      
      // 綁定搜尋輸入框事件
      document.getElementById('searchInput').addEventListener('input', function(e) {
        currentSearchQuery = e.target.value.trim().toLowerCase();
        renderCards();
      });
    };

    // 3. 從 Google Sheet 抓取資料
    function fetchDataFromSheet() {
      showLoading(true);
      const sheetId = '1ByDDPypDeVxd335sPKnMfQQlx7t8n2M_sL8Je98yUwM';
      // 使用 Google Visualization Query API (這比直接載入 CSV 更不易遇到快取與解析問題)
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

      // 設定超時機制 (3秒內如果沒回應，就直接使用極速備用資料)
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 4000);

      fetch(url, { signal: controller.signal })
        .then(response => {
          clearTimeout(timeoutId);
          return response.text();
        })
        .then(text => {
          // 提取其中的 JSON 部分 (Google Visualization API 會包裝在 google.visualization.Query.setResponse(...) 中)
          const jsonStart = text.indexOf('{');
          const jsonEnd = text.lastIndexOf('}');
          const jsonString = text.substring(jsonStart, jsonEnd + 1);
          const data = JSON.parse(jsonString);
          
          processSheetData(data);
        })
        .catch(err => {
          console.warn("無法取得雲端試算表資料，啟用在地高效能資料庫保護機制：", err);
          // 超時或錯誤，使用預設高還原資料
          allPrompts = [...backupData];
          updateSyncIndicator(false);
          buildFilters();
          renderCards();
          showLoading(false);
        });
    }

    // 4. 解析 Google Sheet 回傳的資料結構
    function processSheetData(data) {
      if (!data || !data.table || !data.table.rows) {
        throw new Error("無效的資料格式");
      }

      const cols = data.table.cols;
      const rows = data.table.rows;
      const parsedData = [];

      // 自動尋找正確的欄位對應（分類、標題、提示詞內容等）
      let categoryIdx = 0;
      let titleIdx = 1;
      let promptIdx = 2;

      cols.forEach((col, idx) => {
        const label = col.label ? col.label.trim() : '';
        if (label.includes('分類') || label.toLowerCase().includes('category')) {
          categoryIdx = idx;
        } else if (label.includes('標題') || label.includes('名稱') || label.toLowerCase().includes('title')) {
          titleIdx = idx;
        } else if (label.includes('內容') || label.includes('提示') || label.toLowerCase().includes('prompt')) {
          promptIdx = idx;
        }
      });

      // 走訪每一列
      rows.forEach((row, rowIndex) => {
        if (!row || !row.c) return;

        // 讀取各欄位內容
        const categoryVal = row.c[categoryIdx]?.v || '';
        const titleVal = row.c[titleIdx]?.v || '';
        const promptVal = row.c[promptIdx]?.v || '';

        // 過濾表頭或完全空白的列
        if (categoryVal === '分類' && titleVal === '標題') return;
        if (!titleVal && !promptVal) return;

        parsedData.push({
          category: String(categoryVal).trim() || '未分類',
          title: String(titleVal).trim() || '無標題',
          prompt: String(promptVal).trim() || ''
        });
      });

      if (parsedData.length === 0) {
        allPrompts = [...backupData];
        updateSyncIndicator(false);
      } else {
        allPrompts = parsedData;
        updateSyncIndicator(true);
      }

      buildFilters();
      renderCards();
      showLoading(false);
    }

    // 5. 更新同步狀態燈號
    function updateSyncIndicator(success) {
      const syncStatus = document.getElementById('syncStatus');
      if (success) {
        syncStatus.innerHTML = `
          <span class="inline-flex items-center gap-1 text-emerald-500 font-medium">
            <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block animate-pulse"></span>
            已與 Google Sheet 雲端資料同步庫串接完成
          </span>
        `;
      } else {
        syncStatus.innerHTML = `
          <span class="inline-flex items-center gap-1 text-amber-500 font-medium">
            <span class="w-2 h-2 rounded-full bg-amber-500 inline-block"></span>
            已啟用備用加速提示庫 (雲端連接超時)
          </span>
        `;
      }
    }

    // 6. 動態建立分類篩選標籤
    function buildFilters() {
      // 提取所有不重複的分類
      const categoriesSet = new Set();
      allPrompts.forEach(item => {
        if (item.category) categoriesSet.add(item.category);
      });

      const uniqueCategories = Array.from(categoriesSet);
      const container = document.getElementById('filterContainer');
      
      // 生成基礎 HTML
      let html = `
        <button id="btn-all" onclick="filterCategory('全部')" 
          class="px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 ${
            activeCategory === '全部' 
              ? 'bg-blue-600 text-white shadow-md shadow-blue-200 transform scale-105' 
              : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'
          }">
          全部
        </button>
      `;

      uniqueCategories.forEach(cat => {
        const isSelected = activeCategory === cat;
        html += `
          <button id="btn-${cat}" onclick="filterCategory('${cat}')" 
            class="px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 ${
              isSelected 
                ? 'bg-blue-600 text-white shadow-md shadow-blue-200 transform scale-105' 
                : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'
            }">
            ${cat}
          </button>
        `;
      });

      container.innerHTML = html;
    }

    // 7. 切換類別過濾
    function filterCategory(category) {
      activeCategory = category;
      
      // 更新按鈕樣式
      const buttons = document.querySelectorAll('#filterContainer button');
      buttons.forEach(btn => {
        btn.className = "px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200";
      });

      const activeBtn = document.getElementById(`btn-${category === '全部' ? 'all' : category}`);
      if (activeBtn) {
        activeBtn.className = "px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 bg-blue-600 text-white shadow-md shadow-blue-200 transform scale-105";
      }

      renderCards();
    }

    // 8. 顯示/隱藏載入骨架屏
    function showLoading(isLoading) {
      const skeleton = document.getElementById('loadingSkeleton');
      const grid = document.getElementById('cardsGrid');
      if (isLoading) {
        skeleton.classList.remove('hidden');
        grid.classList.add('hidden');
      } else {
        skeleton.classList.add('hidden');
        grid.classList.remove('hidden');
      }
    }

    // 9. 動態渲染卡片清單到網格中
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      const noResults = document.getElementById('noResults');
      
      // 過濾資料
      const filtered = allPrompts.filter(item => {
        const matchesCategory = (activeCategory === '全部' || item.category === activeCategory);
        const matchesSearch = !currentSearchQuery || 
          item.title.toLowerCase().includes(currentSearchQuery) || 
          item.prompt.toLowerCase().includes(currentSearchQuery) ||
          item.category.toLowerCase().includes(currentSearchQuery);
        
        return matchesCategory && matchesSearch;
      });

      // 更新上方的計數徽章
      const countBadge = document.getElementById('itemsCountBadge');
      countBadge.textContent = `共 ${filtered.length} 個`;

      // 檢查是否有結果
      if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');

      // 生成卡片 HTML
      let html = '';
      filtered.forEach((item, index) => {
        // 分類標籤樣式分配 (根據分類名稱動態給予柔和的主題色)
        let tagColorClasses = "bg-blue-50 text-blue-600 border border-blue-100";
        if (item.category.includes('筆記')) {
          tagColorClasses = "bg-purple-50 text-purple-600 border border-purple-100";
        } else if (item.category.includes('程式')) {
          tagColorClasses = "bg-emerald-50 text-emerald-600 border border-emerald-100";
        } else if (item.category.includes('圖片') || item.category.includes('心智')) {
          tagColorClasses = "bg-pink-50 text-pink-600 border border-pink-100";
        } else if (item.category.includes('優化') || item.category.includes('校正')) {
          tagColorClasses = "bg-amber-50 text-amber-600 border border-amber-100";
        }

        // 將換行符號轉成 HTML 換行
        const formattedPrompt = escapeHtml(item.prompt).replace(/\n/g, '<br>');

        html += `
          <div class="bg-white rounded-2xl border-t-[5px] border-purple-600 shadow-premium hover:shadow-card-hover hover:-translate-y-1.5 transition-all duration-300 p-5 flex flex-col justify-between h-[380px]">
            <div>
              <!-- 頂部標籤 -->
              <div class="flex items-center justify-between mb-3">
                <span class="text-[11px] font-bold px-2.5 py-0.5 rounded-full ${tagColorClasses}">
                  ${escapeHtml(item.category)}
                </span>
              </div>
              
              <!-- 卡片標題 -->
              <h3 class="text-base font-bold text-slate-800 mb-2 truncate" title="${escapeHtml(item.title)}">
                ${escapeHtml(item.title)}
              </h3>
              
              <!-- 內容區 (具備精緻的自訂捲軸) -->
              <div class="text-xs md:text-[13px] text-slate-500 leading-relaxed overflow-y-auto h-[190px] pr-1.5 custom-scrollbar break-words">
                ${formattedPrompt}
              </div>
            </div>
            
            <!-- 複製按鈕 -->
            <div class="mt-4">
              <button 
                onclick="copyPrompt(this, \`${encodeURIComponent(item.prompt)}\`)" 
                class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium text-xs md:text-sm py-2.5 px-4 rounded-xl shadow-sm transition-all duration-200 flex items-center justify-center gap-1.5 transform hover:scale-[1.02]">
                <i class="fa-regular fa-clone"></i>
                <span>複製 Prompt</span>
              </button>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // 10. 複製 Prompt 功能 (使用極具相容性的 clipboard 函數組)
    function copyPrompt(buttonElement, encodedText) {
      const textToCopy = decodeURIComponent(encodedText);
      
      // 先更變按鈕狀態，給予使用者最直觀、最快速的 UI 點擊反饋
      const originalHTML = buttonElement.innerHTML;
      buttonElement.innerHTML = `<i class="fa-solid fa-check"></i> <span>成功複製！</span>`;
      buttonElement.classList.replace('bg-blue-600', 'bg-emerald-600');
      buttonElement.classList.add('scale-95');

      // 執行複製到剪貼簿
      let success = false;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy)
          .then(() => {
            showToast();
          })
          .catch(() => {
            // navigator.clipboard 失敗，嘗試後備機制
            success = fallbackCopy(textToCopy);
            if (success) showToast();
          });
      } else {
        success = fallbackCopy(textToCopy);
        if (success) showToast();
      }

      // 1.5 秒後將按鈕恢復原狀
      setTimeout(() => {
        buttonElement.innerHTML = originalHTML;
        buttonElement.classList.replace('bg-emerald-600', 'bg-blue-600');
        buttonElement.classList.remove('scale-95');
      }, 1500);
    }

    // 後備複製手段：適用於不支援 clipboard API 或受沙盒 Iframe 保護之環境
    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed'; // 避免捲動
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        const successful = document.execCommand('copy');
        document.body.removeChild(textarea);
        return successful;
      } catch (err) {
        document.body.removeChild(textarea);
        return false;
      }
    }

    // 11. 顯示客製化 Toast 通知模組
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.replace('translate-y-24', 'translate-y-0');
      toast.classList.replace('opacity-0', 'opacity-100');
      
      // 3 秒後自動隱藏
      setTimeout(() => {
        toast.classList.replace('translate-y-0', 'translate-y-24');
        toast.classList.replace('opacity-100', 'opacity-0');
      }, 3000);
    }

    // 12. 輔助函數：防範 XSS 的字串逸出
    function escapeHtml(string) {
      return String(string).replace(/[&<>"']/g, function (s) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[s];
      });
    }
  </script>
</body>
